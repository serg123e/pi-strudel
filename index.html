<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi-Strudel</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a100a;
  color: #33ff33;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Giant Pi background */
.pi-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: min(80vw, 80vh);
  color: rgba(0, 255, 0, 0.06);
  font-family: 'Times New Roman', serif;
  pointer-events: none;
  z-index: 0;
  user-select: none;
}

/* Top bar: digit display + play/stop */
.top-bar {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  align-items: stretch;
}

.digit-display {
  flex: 1;
  background: rgba(0, 20, 0, 0.6);
  border: 1px solid rgba(0, 255, 0, 0.3);
  border-radius: 6px;
  padding: 0 16px;
  font-size: 1.4em;
  letter-spacing: 4px;
  color: #20cc20;
  overflow: hidden;
  white-space: nowrap;
  display: flex;
  align-items: center;
}
.digit-display .current {
  color: #fff;
  text-shadow: 0 0 12px #33ff33, 0 0 24px #00cc00;
  font-weight: bold;
}
.digit-display .dot { color: #66ff66; }
.digit-display .dim { color: #0a550a; }

.transport {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.transport button {
  background: rgba(0, 255, 0, 0.1);
  border: 2px solid #1a8a1a;
  color: #33ff33;
  font-family: inherit;
  font-size: 1em;
  padding: 0 24px;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  letter-spacing: 2px;
  white-space: nowrap;
}
.transport button:hover {
  background: rgba(0, 255, 0, 0.25);
  border-color: #33ff33;
  color: #fff;
}
.transport button:active { transform: scale(0.97); }
.transport button.active {
  background: rgba(0, 255, 0, 0.3);
  border-color: #66ff66;
  color: #fff;
  box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
}

/* Toggle row */
.toggles {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 6px;
  padding: 0 12px 8px;
  flex-wrap: wrap;
}
.toggle-btn {
  height: 34px;
  padding: 0 14px;
  background: rgba(0, 20, 0, 0.5);
  border: 2px solid #0a550a;
  border-radius: 5px;
  color: #1a8a1a;
  font-family: inherit;
  font-size: 0.7em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  user-select: none;
  font-weight: 600;
}
.toggle-btn.on {
  background: rgba(0, 255, 0, 0.15);
  border-color: #1a8a1a;
  color: #33ff33;
  box-shadow: 0 0 12px rgba(0, 255, 0, 0.2);
}
.toggle-btn:hover {
  border-color: #20cc20;
  color: #33ff33;
}

/* Sliders row */
.sliders {
  position: relative;
  z-index: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
  padding: 0 12px 8px;
  align-items: center;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 180px;
}
.slider-label {
  font-size: 0.75em;
  color: #1a8a1a;
  flex-shrink: 0;
}
.slider-row input[type="range"] {
  flex: 1;
  min-width: 60px;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  background: #0a200a;
  border-radius: 3px;
  outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  background: #1a8a1a;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid #33ff33;
}
.slider-row input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  background: #1a8a1a;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid #33ff33;
}
.slider-value {
  font-size: 0.75em;
  color: #20cc20;
  min-width: 36px;
}

/* Strudel editor — full width, fill remaining space */
strudel-editor { display: none; }
strudel-editor + div {
  position: relative;
  z-index: 1;
  flex: 1;
  min-height: 0;
}

footer {
  position: relative;
  z-index: 1;
  padding: 4px 12px;
  opacity: 0.4;
  font-size: 11px;
  text-align: right;
}
footer a { color: #33ff33; text-decoration: none; }

/* iOS silent mode reminder */
.ios-hint {
  position: relative;
  z-index: 1;
  background: rgba(0, 40, 0, 0.8);
  border: 1px solid #1a8a1a;
  color: #33ff33;
  font-size: 0.8em;
  padding: 8px 12px;
  margin: 0 12px 8px;
  border-radius: 6px;
  display: none;
  align-items: center;
  gap: 8px;
}
.ios-hint .close-hint {
  background: none;
  border: none;
  color: #1a8a1a;
  font-size: 1.2em;
  cursor: pointer;
  padding: 0 4px;
  margin-left: auto;
}

@media (max-width: 500px) {
  .transport button { padding: 0 14px; font-size: 0.85em; }
  .digit-display { font-size: 1.1em; letter-spacing: 2px; }
  .slider-row { min-width: 140px; }
}
</style>
<script src="https://unpkg.com/@strudel/repl@latest"></script>
</head>
<body>

<div class="pi-bg">&pi;</div>

<div class="top-bar">
  <div class="digit-display" id="digitDisplay">3.14159265358979323846...</div>
  <div class="transport">
    <button id="btnPlayStop" onclick="strudelToggle()">&#9654; PLAY</button>
    <button id="btnShare" onclick="shareState()">SHARE</button>
  </div>
</div>

<div class="toggles">
  <button class="toggle-btn on" data-ch="kick">KICK</button>
  <button class="toggle-btn on" data-ch="clap">CLAP</button>
  <button class="toggle-btn on" data-ch="bass">BASS</button>
  <button class="toggle-btn on" data-ch="synthA">SYN A</button>
  <button class="toggle-btn on" data-ch="synthB">SYN B</button>
  <button class="toggle-btn on" data-ch="texture">TEXTR</button>
  <button class="toggle-btn on" data-ch="vox">VOX</button>
</div>

<div class="sliders">
  <div class="slider-row">
    <span class="slider-label">Voice</span>
    <input type="range" min="0" max="100" value="50" step="1" id="piVoiceVol" autocomplete="off">
    <span class="slider-value" id="piVoiceVolVal">50%</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Play</span>
    <input type="range" min="1" max="8" value="4" step="1" id="piPlay" autocomplete="off">
    <span class="slider-value" id="piPlayVal">4</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Silence</span>
    <input type="range" min="0" max="8" value="4" step="1" id="piSilence" autocomplete="off">
    <span class="slider-value" id="piSilenceVal">4</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Offset</span>
    <input type="range" min="-400" max="400" value="85" step="1" id="piOffset" autocomplete="off">
    <span class="slider-value" id="piOffsetVal">85 ms</span>
  </div>
</div>

<div class="ios-hint" id="iosHint">
  Turn off Silent Mode (flip the switch on the side) to hear audio
  <button class="close-hint" onclick="this.parentElement.style.display='none'">&times;</button>
</div>

<script>
  window._mutes = {kick:true, clap:true, bass:true, synthA:true, synthB:true, texture:true, vox:true};
  window._piOffsetMs = 85 / 1000;
  window._piPlayBeats = 4;
  window._piSilenceBeats = 4;
  window._piVoiceVol = 0.5;
  window._piPos = 0;
  window._piBuffer = [];

  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const ch = this.dataset.ch;
      window._mutes[ch] = !window._mutes[ch];
      this.classList.toggle('on', window._mutes[ch]);
    });
  });

  document.getElementById('piOffset').addEventListener('input', function() {
    window._piOffsetMs = Number(this.value) / 1000;
    document.getElementById('piOffsetVal').textContent = this.value + ' ms';
  });
  document.getElementById('piPlay').addEventListener('input', function() {
    window._piPlayBeats = Number(this.value);
    document.getElementById('piPlayVal').textContent = this.value;
  });
  document.getElementById('piSilence').addEventListener('input', function() {
    window._piSilenceBeats = Number(this.value);
    document.getElementById('piSilenceVal').textContent = this.value;
  });
  document.getElementById('piVoiceVol').addEventListener('input', function() {
    window._piVoiceVol = Number(this.value) / 100;
    document.getElementById('piVoiceVolVal').textContent = this.value + '%';
  });

  /* iOS detection */
  const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  /* Play/Stop via strudel-editor.editor (StrudelMirror API) */
  let _playing = false;
  function strudelToggle() {
    const el = document.querySelector('strudel-editor');
    const btn = document.getElementById('btnPlayStop');
    if (_playing) {
      if (el && el.editor) el.editor.stop();
      if (window._piInterval) { clearInterval(window._piInterval); window._piInterval = null; }
      btn.innerHTML = '&#9654; PLAY';
      btn.classList.remove('active');
      _playing = false;
    } else {
      /* iOS Safari: unlock Web Audio by playing a silent buffer and
         resuming every AudioContext we can find — must happen
         synchronously inside the user-gesture call stack. */
      (function unlockAudio() {
        var CtxClass = window.AudioContext || window.webkitAudioContext;
        /* 1. Resume strudel's shared context if available */
        try {
          var sac = typeof getAudioContext === 'function' && getAudioContext();
          if (sac && sac.state === 'suspended') sac.resume();
        } catch(_){}
        /* 2. Play a silent buffer through a fresh context (iOS unlock trick) */
        if (CtxClass) {
          try {
            var tmp = new CtxClass();
            var buf = tmp.createBuffer(1, 1, 22050);
            var src = tmp.createBufferSource();
            src.buffer = buf;
            src.connect(tmp.destination);
            src.start(0);
            if (tmp.state === 'suspended') tmp.resume();
          } catch(_){}
        }
        /* 3. Also try an <audio> element play (unlocks on some iOS versions) */
        try {
          var a = new Audio();
          a.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
          a.volume = 0;
          a.play().catch(function(){});
        } catch(_){}
      })();
      if (el && el.editor) el.editor.evaluate();
      btn.innerHTML = '&#9632; STOP';
      btn.classList.add('active');
      _playing = true;
      if (_isIOS) document.getElementById('iosHint').style.display = 'flex';
    }
  }

  /* Share: compress state into URL hash (with fallback for older Safari) */
  const _hasCompression = typeof CompressionStream !== 'undefined';
  async function deflate(str) {
    if (!_hasCompression) return new TextEncoder().encode(str);
    const s = new Blob([str]).stream().pipeThrough(new CompressionStream('deflate-raw'));
    return new Uint8Array(await new Response(s).arrayBuffer());
  }
  async function inflate(bytes) {
    if (!_hasCompression) return new TextDecoder().decode(bytes);
    const s = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
    return new Response(s).text();
  }
  function toB64Url(bytes) {
    let b = '';
    for (let i = 0; i < bytes.length; i++) b += String.fromCharCode(bytes[i]);
    return btoa(b).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  function fromB64Url(s) {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    const bin = atob(s);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function shareState() {
    const el = document.querySelector('strudel-editor');
    const state = {
      m: window._mutes,
      o: Number(document.getElementById('piOffset').value),
      p: Number(document.getElementById('piPlay').value),
      s: Number(document.getElementById('piSilence').value),
      v: Number(document.getElementById('piVoiceVol').value),
      c: (el && el.editor) ? el.editor.code : ''
    };
    const compressed = await deflate(JSON.stringify(state));
    const hash = toB64Url(compressed);
    const url = location.origin + location.pathname + '#' + hash;
    history.replaceState(null, '', '#' + hash);
    const btn = document.getElementById('btnShare');
    try {
      await navigator.clipboard.writeText(url);
      btn.textContent = 'COPIED';
    } catch (e) {
      btn.textContent = 'URL SET';
    }
    setTimeout(() => { btn.textContent = 'SHARE'; }, 1500);
  }

  async function restoreFromHash() {
    const hash = location.hash.slice(1);
    if (!hash) return;
    try {
      const bytes = fromB64Url(hash);
      const json = await inflate(bytes);
      const state = JSON.parse(json);

      /* restore mutes */
      if (state.m) {
        window._mutes = state.m;
        document.querySelectorAll('.toggle-btn').forEach(btn => {
          const ch = btn.dataset.ch;
          if (ch in state.m) btn.classList.toggle('on', state.m[ch]);
        });
      }
      /* restore sliders */
      if (state.o != null) {
        document.getElementById('piOffset').value = state.o;
        document.getElementById('piOffsetVal').textContent = state.o + ' ms';
        window._piOffsetMs = state.o / 1000;
      }
      if (state.p != null) {
        document.getElementById('piPlay').value = state.p;
        document.getElementById('piPlayVal').textContent = state.p;
        window._piPlayBeats = state.p;
      }
      if (state.s != null) {
        document.getElementById('piSilence').value = state.s;
        document.getElementById('piSilenceVal').textContent = state.s;
        window._piSilenceBeats = state.s;
      }
      if (state.v != null) {
        document.getElementById('piVoiceVol').value = state.v;
        document.getElementById('piVoiceVolVal').textContent = state.v + '%';
        window._piVoiceVol = state.v / 100;
      }
      /* restore code — wait for editor to initialize */
      if (state.c) {
        const el = document.querySelector('strudel-editor');
        let retries = 0;
        function trySetCode() {
          if (el && el.editor) { el.editor.setCode(state.c); return; }
          if (++retries > 50) return;
          setTimeout(trySetCode, 200);
        }
        trySetCode();
      }
    } catch (e) {
      console.warn('Failed to restore from hash:', e);
    }
  }
  restoreFromHash();

  /* Digit display updater — fit one line, skip if unchanged */
  let _lastPiPos = -1;
  function updateDigitDisplay() {
    const buf = window._piBuffer;
    const pos = window._piPos;
    if (!buf || buf.length === 0 || pos === _lastPiPos) return;
    _lastPiPos = pos;

    const el = document.getElementById('digitDisplay');
    const charW = parseFloat(getComputedStyle(el).fontSize) * 0.65 + 4;
    const maxChars = Math.floor((el.clientWidth - 32) / charW);
    const past = Math.min(pos, Math.floor(maxChars * 0.4));
    const start = Math.max(0, pos - past);
    const end = Math.min(buf.length, start + maxChars);
    let html = '';
    const skip = (start === 0) ? 1 : 0;
    if (start === 0) html += '<span class="dot">3.</span>';
    for (let i = start + skip; i < end; i++) {
      if (i === pos - 1) {
        html += '<span class="current">' + buf[i] + '</span>';
      } else if (i < pos) {
        html += '<span class="dim">' + buf[i] + '</span>';
      } else {
        html += buf[i];
      }
    }
    el.innerHTML = html;
  }
  setInterval(updateDigitDisplay, 100);
</script>

<strudel-editor id="strudelEd">
</strudel-editor>
<script>
  document.getElementById('strudelEd')._defaultCode = `
const cps = 220 * 0.25 / 60
setCps(cps)

function muteGate(ch, vol) {
  return pure(vol).fmap(v => (window._mutes || {})[ch] !== false ? v : 0)
}

/* percussion */
$: s("bd!2 mt ~").bank("tr909")
  .off(1/4, x=>x)
  .lpf(slider(8000, 200, 16000, 100))
  .gain(muteGate('kick', .39))
  ._pianoroll()
$: s("~ cp(2,8)").bank("tr909")
  .off(1/32, x=>x)
  .gain(muteGate('clap', .38))

/* sub bass */
const bassNote = slider(41, 24, 53, 1)

$: note(bassNote)
  .struct("x x ~ ~ x ~ x ~")
  .sound("sine")
  .lpf(sine.slow(6).rangex(slider(100, 40, 250, 5), slider(170, 80, 400, 5)))
  .decay(slider(0.8, 0.1, 1.5, 0.05))
  .release(slider(0.22, 0.05, 0.5, 0.02))
  .gain("0.95 0.55 0 0  0.8 0 0.45 0")
  .gain(muteGate('bass', 1))
  ._scope()

/* synth layers */
$: note("<[c2 c3]*4 [ab1 ab2]*4 [bb2 bb3]*4 [g2 g3]*4>").color("cyan")
  .sound("z_tan").lpf("<800 200 1200 400> 1000 200 400, 200 <400 2000>")
  .pan(slider(0.1, 0, 1, 0.05))
  .gain(muteGate('synthA', .9))
  ._pianoroll()

$: note("<[c2 c3]*4 [ab1 ab2]*4 [bb2 bb3]*4 [g2 g3]*4>").color("red")
  .sound("z_square").lpf("<800 200 1200 400> 1000 200 400, 200 <400 2000>")
  .rev().pan(slider(0.9, 0, 1, 0.05))
  .gain(muteGate('synthB', .9))
  ._pianoroll()

/* texture */
$: s("<z_noise ~ ~ ~>")
  .lpf(sine.rangex(800, 10000))
  .delay(slider(0.25, 0, 1, 0.05)).delayfeedback(slider(0.4, 0, 0.9, 0.05))
  .shape(slider(0.2, 0, 0.8, 0.05))
  .gain(muteGate('texture', .2))
  ._scope()

/* ====== pi digit stream (Web Audio scheduler) ====== */
const piBase = 'https:' + String.fromCharCode(47,47) + 'api.pi.delivery/v1/pi'
const piBuffer = []
let piFetching = false
async function piFetch() {
  if (piFetching) return
  piFetching = true
  const url = piBase + '?start=' + piBuffer.length + '&numberOfDigits=1000'
  const { content } = await (await fetch(url)).json()
  piBuffer.push(...Array.from(content, Number))
  window._piBuffer = piBuffer
  piFetching = false
}

const ac = getAudioContext()
const [digitBuffers] = await Promise.all([
  Promise.all(Array.from({length: 10}, (_, i) =>
    fetch('./samples/' + i + '.mp3')
      .then(r => r.arrayBuffer())
      .then(ab => ac.decodeAudioData(ab))
  )),
  piFetch()
])

let piPos = 0
let piNextTime = ac.currentTime + 0.5
let piBeatCount = 0
const dpc = 4 /* digits per cycle */
const piSpeed = 1 / (cps * dpc) /* synced to strudel tempo */
const piVol = window._piVoiceVol ?? 0.5

function schedulePi() {
  while (piNextTime < ac.currentTime + 0.3) {
    const playB = window._piPlayBeats || 4
    const silB = window._piSilenceBeats || 0
    const totalB = playB + silB
    const beatInPhrase = piBeatCount % totalB
    const isSilent = beatInPhrase >= playB

    if (!isSilent && (window._mutes || {}).vox !== false) {
      if (piPos >= piBuffer.length - 100) piFetch()
      const d = piBuffer[piPos % piBuffer.length]
      piPos++
      window._piPos = piPos
      const src = ac.createBufferSource()
      src.buffer = digitBuffers[d]
      const g = ac.createGain()
      g.gain.value = window._piVoiceVol ?? piVol
      src.connect(g).connect(ac.destination)
      src.start(piNextTime + (window._piOffsetMs || 0))
    }
    piBeatCount++
    piNextTime += piSpeed
  }
}
if (window._piInterval) clearInterval(window._piInterval)
window._piInterval = setInterval(schedulePi, 100)
`.trim();

  /* Ensure editor shows default code — the strudel-editor web component
     may start empty (e.g. on Android Chrome, or when no HTML comment is
     present).  Poll until the editor initialises, then inject _defaultCode. */
  if (!location.hash.slice(1)) {
    var _el = document.getElementById('strudelEd');
    var _r = 0;
    (function _ensureCode() {
      if (_el && _el.editor) {
        if (!_el.editor.code || !_el.editor.code.trim()) {
          _el.editor.setCode(_el._defaultCode);
        }
        return;
      }
      if (++_r > 50) return;
      setTimeout(_ensureCode, 200);
    })();
  }
</script>

<footer>
  <a href="https://github.com/serg123e/pi-strudel" target="_blank" rel="noopener">GitHub</a>
</footer>

</body>
</html>
